name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - 'exercises/full-dapp-flow/**'
  workflow_dispatch:

concurrency:
  group: proposal-dapp-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: exercises/full-dapp-flow
    env:
      VITE_PROGRAM_ID: 8o5EoWMSG3m4YjYMava2xzqmZtXxoHoLM8T8QttYtKFG
      VITE_NETWORK: devnet
      VITE_RPC_ENDPOINT: ${{ secrets.VITE_RPC_ENDPOINT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: exercises/full-dapp-flow/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify fixed UI source
        run: |
          grep -q "useMemo" src/lib/program.ts
          grep -q "ProposalCard" src/App.tsx
          ! grep -q "ProposalList key" src/App.tsx

      - name: Build
        run: npm run build

      - name: Verify fixed UI build
        run: |
          grep -R "Activate" dist/assets
          grep -R "Vote" dist/assets
          ! grep -R "Use ProposalCard component for full functionality" dist/assets

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
